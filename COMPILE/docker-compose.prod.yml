version: "3.9"

# Production overlay. Apply with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Drops dev tooling, enforces restart, resource limits, read-only fs where feasible.

x-restart: &restart_policy
  restart: unless-stopped

services:
  postgres:
    <<: *restart_policy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
        reservations:
          cpus: "0.5"
          memory: 512m
    # postgres needs a writable data dir (volume) so we cannot make rootfs read-only globally.
    security_opt:
      - no-new-privileges:true

  redis:
    <<: *restart_policy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    security_opt:
      - no-new-privileges:true

  minio:
    <<: *restart_policy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    security_opt:
      - no-new-privileges:true

  minio-init:
    restart: "no"

  # adminer disabled in prod (its profile excludes it from default `up` anyway).
  adminer:
    profiles: ["never"]

  backend:
    <<: *restart_policy
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE must be set}
    build: !reset null
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.5"
          memory: 1g
        reservations:
          cpus: "0.25"
          memory: 256m
    # Do not publish the backend port directly in prod; nginx will reverse-proxy.
    ports: !reset []
    expose:
      - "3600"

  web:
    <<: *restart_policy
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE must be set}
    build: !reset null
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
      - /app/src/frontend/.next/cache:size=256m
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 768m
    ports: !reset []
    expose:
      - "3601"

  nginx:
    image: nginx:1.27-alpine
    container_name: deliveriq-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/docker/tls:/etc/nginx/tls:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE", "CHOWN", "SETGID", "SETUID"]
    security_opt:
      - no-new-privileges:true
