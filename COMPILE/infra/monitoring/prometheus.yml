global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: deliveriq
    env: ${ENV:-staging}

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # add Alertmanager target here, e.g. ['alertmanager:9093']

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # NOTE: Backend `/metrics` endpoint is NOT YET implemented (TODO in Coder backlog).
  # Once `prom-client` is wired in `src/backend/src/server.ts`, uncomment below.
  # - job_name: deliveriq-backend
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ["backend:3600"]
  #       labels:
  #         service: backend

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis-exporter
    static_configs:
      - targets: ["redis-exporter:9121"]
