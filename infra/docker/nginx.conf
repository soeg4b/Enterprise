# Reverse proxy with TLS termination, HSTS, gzip, security headers passthrough.
# Place certificates under /etc/nginx/tls/{fullchain.pem,privkey.pem}.

worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  keepalive_timeout 30s;
  server_tokens off;
  client_max_body_size 30m;
  client_body_timeout  30s;
  client_header_timeout 10s;
  send_timeout 30s;
  types_hash_max_size 2048;

  log_format json escape=json
    '{"ts":"$time_iso8601","remote":"$remote_addr","method":"$request_method",'
    '"uri":"$request_uri","status":$status,"bytes":$body_bytes_sent,'
    '"rt":$request_time,"ua":"$http_user_agent","rid":"$http_x_request_id"}';
  access_log /var/log/nginx/access.log json;
  error_log  /var/log/nginx/error.log warn;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    application/json application/javascript application/xml+rss
    text/plain text/css text/javascript text/xml image/svg+xml;

  # Trust LB / Cloudflare ranges as needed.
  set_real_ip_from 10.0.0.0/8;
  real_ip_header X-Forwarded-For;
  real_ip_recursive on;

  # Rate limit zones (defence-in-depth on top of app-side limiter).
  limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=api_login:10m   rate=5r/m;

  upstream api_backend {
    least_conn;
    server backend:3600 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  upstream web_frontend {
    least_conn;
    server web:3000 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  # ---- HTTP -> HTTPS redirect, plus internal /healthz ------------------------
  server {
    listen 80 default_server;
    server_name _;

    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }
    location /.well-known/acme-challenge/ { root /var/www/acme; }
    location / { return 301 https://$host$request_uri; }
  }

  # ---- HTTPS -----------------------------------------------------------------
  server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/tls/fullchain.pem;
    ssl_certificate_key /etc/nginx/tls/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers (app sets its own; we add transport-level ones here).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    # Pass through app CSP if present; do NOT override here.

    # ---- API ----
    location /v1/auth/login {
      limit_req zone=api_login burst=5 nodelay;
      proxy_pass http://api_backend;
      include /etc/nginx/proxy_params.conf;
    }

    location ~ ^/(v1|healthz|readyz|metrics)(/|$) {
      limit_req zone=api_general burst=60 nodelay;
      proxy_pass http://api_backend;
      include /etc/nginx/proxy_params.conf;
    }

    # ---- Web (Next.js) ----
    location / {
      proxy_pass http://web_frontend;
      include /etc/nginx/proxy_params.conf;
    }
  }
}
